add_newline = true
command_timeout = 200
format = "$directory$git_branch$git_status$character"

[character]
error_symbol = "[✗](bold #AF3029)"
success_symbol = "[❯](bold #4385BE)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
style = "bold #CECDC3"
repo_root_style = "bold #4385BE"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic #4385BE"

[git_status]
format = '[$all_status]($style)'
style = "#4385BE"
ahead = "⇡${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
behind = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked = "? "
modified = " "
stashed = ""
staged = ""
renamed = ""
deleted = ""
