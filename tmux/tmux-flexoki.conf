# Flexoki theme colors for tmux
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=#100F0F,bg=#4385BE,bold] #S #[bg=default] "
setw -g window-status-format "#[fg=#575653] #I:#W "
setw -g window-status-current-format "#[fg=#4385BE,bold] #I:#W "
set -g status-right "#[fg=#4385BE]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#575653]#h "
set -g pane-border-style "fg=#2B2A28"
set -g pane-active-border-style "fg=#4385BE"
set -g message-style "bg=default,fg=#4385BE"
set -g message-command-style "bg=default,fg=#4385BE"
set -g mode-style "bg=#4385BE,fg=#100F0F"
setw -g clock-mode-colour "#4385BE"
