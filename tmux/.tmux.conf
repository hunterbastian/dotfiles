# Remap prefix from Ctrl+B to Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Intuitive splits (| and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Mouse support (click panes, resize, scroll)
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Faster escape (for vim/neovim)
set -sg escape-time 10

# Increase scrollback
set -g history-limit 50000

# Focus events & clipboard
set -g focus-events on
set -g set-clipboard on

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+arrow
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Auto-rename windows to current directory
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# --- Status bar (Omarchy layout) ---
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# --- Theme (sourced separately for easy switching) ---
source-file ~/.dotfiles/tmux/tmux-tokyo-night.conf

# --- TPM (plugin manager) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save and restore sessions
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Bootstrap TPM
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'
