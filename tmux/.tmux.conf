# Remap prefix from Ctrl+B to Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Intuitive splits (| and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Mouse support (click panes, resize, scroll)
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Faster escape (for vim/neovim)
set -sg escape-time 10

# Increase scrollback
set -g history-limit 10000

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+arrow
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# --- Status bar (Flexoki palette) ---
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1C1B1A,fg=#575653"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#FFFCF0,bg=#4385BE,bold]  #S #[bg=#1C1B1A] "

# Window tabs
setw -g window-status-format "#[fg=#575653] #I:#W "
setw -g window-status-current-format "#[fg=#FFFCF0,bg=#2B2A28,bold] #I:#W "
setw -g window-status-separator ""

# Right: git branch, battery, time
set -g status-right-length 80
set -g status-right "#[fg=#66800B] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo '-') #[fg=#575653]│ #[fg=#BC5215]󰁹 #(pmset -g batt | grep -Eo '[0-9]+%%' | head -1) #[fg=#575653]│ #[fg=#4385BE] %H:%M #[fg=#575653]%b %d"

# Pane borders
set -g pane-border-style "fg=#2B2A28"
set -g pane-active-border-style "fg=#4385BE"

# --- TPM (plugin manager) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save and restore sessions
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Bootstrap TPM
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'
